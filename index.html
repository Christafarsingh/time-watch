<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Stopwatch</title>
    <!-- Google Font: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="app-container">
        <section class="stopwatch-card">
            <div class="timer-display" id="timer">00:00.00</div>
            <div class="button-group">
                <button id="startBtn" class="control-btn primary">Start</button>
                <button id="pauseBtn" class="control-btn secondary" disabled>Pause</button>
                <button id="resetBtn" class="control-btn danger" disabled>Reset</button>
                <button id="lapBtn" class="control-btn accent" disabled>Lap</button>
                <button id="clearLapsBtn" class="control-btn danger" disabled>Clear Laps</button>
            </div>
            <ol class="laps-list" id="lapsList"></ol>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
